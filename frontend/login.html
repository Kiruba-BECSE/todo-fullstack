<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Todo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="brand">Fieldnotes</div>
      <h1>Welcome back</h1>
      <p class="auth-sub">Log in to see your lists.</p>

      <div class="error" id="errorBox"></div>

      <form id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="password">Password</label>
        <input type="password" id="password" required>

        <button type="submit">Log in</button>
      </form>

      <div class="switch-link">
        New here? <a href="signup.html">Create an account</a>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('show');

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(errorBox, data.error || 'Login failed');
          return;
        }

        saveAuth(data.token, data.user);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(errorBox, 'Could not connect to server');
      }
    });
  </script>
</body>
</html>
