<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>My To-Do List</h1>
    <form id="todoForm">
      <input type="text" id="todoInput" placeholder="Add a task..." required>
      <button type="submit">Add</button>
    </form>
    <ul id="todoList"></ul>
  </div>
  <script src="script.js"></script>
</body>
</html>
