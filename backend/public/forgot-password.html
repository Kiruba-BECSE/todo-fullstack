<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — Momentum</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card glass">
      <div class="brand"><span class="dot"></span>MOMENTUM</div>

      <div class="error" id="errorBox"></div>
      <div class="error" id="successBox" style="background: rgba(16,185,129,0.12); border-color: rgba(16,185,129,0.3); color: #6EE7B7;"></div>

      <!-- STEP 1: enter email -->
      <div id="step1">
        <h1>Forgot password?</h1>
        <p class="auth-sub">Enter your email and we'll send a reset code.</p>
        <form id="emailForm">
          <label for="email">Email</label>
          <input type="email" id="email" required>
          <button type="submit">Send reset code</button>
        </form>
      </div>

      <!-- STEP 2: enter code -->
      <div id="step2" style="display:none;">
        <h1>Enter the code</h1>
        <p class="auth-sub">Check your email for a 6-digit code.</p>
        <form id="codeForm">
          <label for="code">Verification code</label>
          <input type="text" id="code" maxlength="6" placeholder="123456" required>
          <button type="submit">Verify code</button>
        </form>
      </div>

      <!-- STEP 3: set new password -->
      <div id="step3" style="display:none;">
        <h1>Set new password</h1>
        <p class="auth-sub">Choose a new password for your account.</p>
        <form id="resetForm">
          <label for="newPassword">New password</label>
          <input type="password" id="newPassword" required minlength="6">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" required minlength="6">
          <button type="submit">Reset password</button>
        </form>
      </div>

      <div class="switch-link">
        <a href="index.html">← Back to login</a>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';
    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');

    let userEmail = '';
    let resetToken = '';

    function showError(el, msg) {
      errorBox.classList.remove('show');
      successBox.classList.remove('show');
      el.textContent = msg;
      el.classList.add('show');
    }

    // STEP 1
    document.getElementById('emailForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      userEmail = document.getElementById('email').value;

      const res = await fetch(`${API}/auth/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail })
      });
      const data = await res.json();

      if (!res.ok) return showError(errorBox, data.error || 'Something went wrong');

      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';
    });

    // STEP 2
    document.getElementById('codeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = document.getElementById('code').value;

      const res = await fetch(`${API}/auth/verify-reset-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail, code })
      });
      const data = await res.json();

      if (!res.ok) return showError(errorBox, data.error || 'Invalid code');

      resetToken = data.resetToken;
      document.getElementById('step2').style.display = 'none';
      document.getElementById('step3').style.display = 'block';
    });

    // STEP 3
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        return showError(errorBox, 'Passwords do not match');
      }

      const res = await fetch(`${API}/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ resetToken, newPassword })
      });
      const data = await res.json();

      if (!res.ok) return showError(errorBox, data.error || 'Could not reset password');

      showError(successBox, 'Password reset! Redirecting to login…');
      setTimeout(() => window.location.href = 'index.html', 1500);
    });
  </script>
</body>
</html>
