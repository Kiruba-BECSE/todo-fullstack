<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>List — Fieldnotes</title>
<link rel="stylesheet" href="style.css">
<style>
  .todo-item.dragging { opacity: 0.4; }
  .todo-item { cursor: grab; }
</style>
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <div class="brand">Fieldnotes</div>
     <div class="user-chip">
  <span id="userName"></span>
  <button class="secondary" onclick="window.location.href='settings.html'">Settings</button>
  <button onclick="logout()">Log out</button>
</div>
    </div>

    <a href="dashboard.html" class="back-link">← All lists</a>

    <div class="page-head">
      <h1 id="listTitle">Loading…</h1>
    </div>

    

    <div class="stats-bar" id="statsBar"></div>

    <div class="tag-filters" id="tagFilters"></div>

<form class="new-row" id="newItemForm" style="flex-wrap: wrap;">
  <input type="text" id="newItemTitle" placeholder="Add a task…" required style="width: 100%; margin-bottom: 12px;">

<div style="margin-bottom: 20px;">
  <label style="font-size: 11px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 6px;">Set reminder (optional)</label>
  <input type="datetime-local" id="newItemReminder" style="width: 100%;">
</div>

<div class="tag-picker glass" style="padding: 14px 16px; margin-bottom: 20px;">
  <div style="font-size: 12px; color: var(--text-soft); margin-bottom: 10px;">Tags for this task (optional)</div>
  <div class="tag-filters" id="tagPickerOptions" style="margin-bottom: 10px;"></div>
  <div style="display: flex; gap: 8px;">
    <input type="text" id="customTagInput" placeholder="Add a custom tag…" style="flex: 1; font-size: 13px; padding: 9px 12px;">
    <button type="button" class="secondary" onclick="addCustomTag()" style="padding: 9px 14px; font-size: 12px; margin: 0;">Add</button>
  </div>
</div>

<button type="button" id="submitNewTask" class="primary" style="width: 100%; margin-bottom: 24px;">Add task</button>
</form>

</form>
    <ul class="todo-list" id="todoList"></ul>
  </div>

  <script src="auth.js"></script>
  <script src="list.js"></script>
</body>
</html>
